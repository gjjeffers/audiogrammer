name: Build & Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Pre-fetch imageio_ffmpeg binary
        run: python -c "import imageio_ffmpeg; imageio_ffmpeg.get_ffmpeg_exe()"

      - name: Build EXE from spec
        run: pyinstaller audiogrammer.spec

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = Get-FileHash -Path "dist\Audiogrammer.exe" -Algorithm SHA256
          "$($hash.Hash)  Audiogrammer.exe" | Out-File -FilePath "dist\Audiogrammer.exe.sha256" -Encoding ascii

      - name: Upload EXE and checksum to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Audiogrammer.exe
            dist/Audiogrammer.exe.sha256